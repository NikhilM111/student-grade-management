spring:
  application:
    name: student-grade-management

#===================== DB Setup ===============================
  datasource:
    url: jdbc:postgresql://localhost:5432/student_grade_db
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver
#===================== DB Setup ===============================

#===================== Hibernet Setup ===============================
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
#===================== Hibernet Setup ===============================
server:
  port: 8080 # -> My backend Tomcat is running here